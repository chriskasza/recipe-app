services:
  app:                       # default frontend (HTMX/Jinja web UI) — always on
    build: .
    image: recipe-app
    ports:
      - "3141:3141"
    volumes:
      - ./recipes:/app/recipes
      - ./data:/app/data
      - ./tmp:/app/tmp
    environment:
      RECIPES_DIR: /app/recipes
      DATA_DIR: /app/data
    restart: unless-stopped

  # Opt-in operator CLI as a one-shot, e.g. `docker compose --profile cli run --rm cli recipes validate`
  cli:
    build: .
    image: recipe-app        # reuses the app image instead of a second build
    profiles: ["cli"]
    volumes:
      - ./recipes:/app/recipes
      - ./data:/app/data
      - ./tmp:/app/tmp
    environment:
      APP_ROLE: cli
      RECIPES_DIR: /app/recipes
      DATA_DIR: /app/data
    command: ["recipes", "doctor"]

